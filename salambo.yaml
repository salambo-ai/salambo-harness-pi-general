version: 1
name: salambo-harness-pi-general
runtime: pi

image:
  # Required by salambo.yaml v1 schema. Hosted source deploys build into
  # Salambo-managed Depot registry; this is not used for local publishing.
  repository: ghcr.io/salambo-ai/salambo-harness-pi-general
  tag: git-sha
  context: .
  dockerfile: Dockerfile
  platform: linux/amd64
  buildArgs: {}

snapshot:
  name: salambo-harness-pi-general
  entrypoint: /app/sandbox/entrypoint.sh
  size: s

agent:
  name: Salambo Pi Harness
  slug: salambo-harness-pi-general
  description: General-purpose Pi sandbox agent.
  icon: 🤖
  isActive: true

runtimeConfig:
  egressPolicyMode: restricted
  egressAllowlist:
    - api.openai.com
  otlpEndpointOverride: null
  otelIncludeContentOverride: null

env:
  MODEL:
    value: gpt-5.2
    description: Default model mirrored from agent/settings.json.

secrets:
  OPENAI_API_KEY:
    fromEnv: OPENAI_API_KEY
    description: OpenAI provider key.
    exposeTo:
      - runtime

extensions:
  - path: extensions/smoke.mjs
    mode: auto
