version: 1
name: salambo-harness-pi-missing-secret-qa
runtime: pi

image:
  context: .
  dockerfile: sandbox/Dockerfile
  platform: linux/amd64
  buildArgs: {}

snapshot:
  name: salambo-harness-pi-missing-secret-qa
  entrypoint: /app/sandbox/entrypoint.sh
  size: s

agent:
  name: Salambo Pi Missing Secret QA
  slug: salambo-harness-pi-missing-secret-qa
  description: Staging-only fixture that proves missing run-scoped provider auth fails safely.
  icon: 🧪
  isActive: true

runtimeConfig:
  egressPolicyMode: restricted
  egressAllowlist:
    - api.openai.com
  otlpEndpointOverride: null
  otelIncludeContentOverride: null

env:
  MODEL:
    value: gpt-5.2
    description: Default model mirrored from agent/settings.json.

secrets: {}

extensions:
  - path: agent/extensions/smoke.mjs
    mode: auto
