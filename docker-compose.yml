services:
  agent-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salambo-harness-pi-general
    ports:
      - "3000:3000"  # API server
      - "8001:8000"  # Python HTTP server or custom apps
      - "8081:8080"  # Alternative web server port
      - "9002:9000"  # Flask/Express apps
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3000
      - WORKSPACE_DIR=/workspace
      - GATEWAY_BASE_URL=${GATEWAY_BASE_URL}
      - NODE_ENV=production
      - S2_ACCESS_TOKEN=${S2_ACCESS_TOKEN}
      - S2_BASIN=${S2_BASIN}
      - S2_STREAM_PREFIX=${S2_STREAM_PREFIX:-agent-session}
    volumes:
      - workspace-data:/workspace
      - type: bind
        source: ${HOME}/.pi/agent/auth.json
        target: /tmp/pi-host-auth.json
        read_only: true
        bind:
          create_host_path: false
      # Mount for development (comment out in production)
      # - ./src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  workspace-data:
    driver: local
