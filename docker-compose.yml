services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salambo-harness-pi-general
    environment:
      - WORKSPACE_DIR=/workspace
      - GATEWAY_BASE_URL=${GATEWAY_BASE_URL}
      - NODE_ENV=production
    volumes:
      - ./workspace:/workspace
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
