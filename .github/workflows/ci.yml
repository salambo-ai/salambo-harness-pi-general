name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check extension syntax
        run: node --check agent/extensions/smoke.mjs

      - name: Validate sandbox packages
        run: |
          node --input-type=module -e "const c=(await import('./sandbox/packages.mjs')).default; for (const k of ['apt','npm','pip']) if (!Array.isArray(c[k]) || c[k].some((x)=>typeof x !== 'string')) throw new Error(k); if (typeof c.setup !== 'string') throw new Error('setup'); console.log('sandbox/packages.mjs OK')"

      - name: Docker build smoke test
        if: ${{ vars.SALAMBO_DOCKER_BUILD_SMOKE == 'true' }}
        run: docker build -f sandbox/Dockerfile .
