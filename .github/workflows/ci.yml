name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - claude/evaluate-sdk-usefulness-utkli

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate sandbox image config
        run: npm run sandbox:validate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Materialize sandbox image config
        run: npm run sandbox:materialize

      - name: Docker build smoke test
        if: ${{ vars.SALAMBO_DOCKER_BUILD_SMOKE == 'true' }}
        run: docker build .
